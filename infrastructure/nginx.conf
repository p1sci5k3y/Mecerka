# This file should be placed in /etc/nginx/sites-available/mecerka on the EC2 host

server {
    listen 80;
    server_name mecerka.com www.mecerka.com;

    # Redirect all HTTP requests to plain HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.mecerka.com;

    # Redirect all HTTP API requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------
# HTTPS Servers (Certificates managed automatically by Certbot)
# -------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name mecerka.com www.mecerka.com;

    ssl_certificate /etc/letsencrypt/live/mecerka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mecerka.com/privkey.pem;

    # Recommended Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://127.0.0.1:3001; # Docker container mapped frontend port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.mecerka.com;

    ssl_certificate /etc/letsencrypt/live/api.mecerka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mecerka.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000; # Docker container mapped backend port
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Support for real-time tracking (NestJS Socket.IO)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400; # Prevent websocket timeouts
    }
}
