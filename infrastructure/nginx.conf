# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

server {
    server_name mecerka.me www.mecerka.me;

    # Advanced Security: Masking technology versions
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Security: Limit request body size
    client_max_body_size 10M;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Advanced Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geoloc=(), payment=(self 'https://mecerka.me')" always;

    # Secure all cookies: ensure HttpOnly, Secure, and SameSite=Lax regardless of path
    # Using ~ to match all cookies and apply flags without duplicating them
    proxy_cookie_flags ~ HttpOnly secure samesite=lax;

    # Backend API and WebSockets
    location /api/ {
        # Apply Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr_limit 10;

        proxy_pass http://127.0.0.1:3000/; # Trailing slash strips /api
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Security: Prevent proxying to unknown headers
        proxy_set_header Proxy "";
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        
        # Limit connections for WebSockets
        limit_conn addr_limit 5;
    }

    # Frontend Application
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mecerka.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mecerka.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.mecerka.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = mecerka.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name mecerka.me www.mecerka.me;
    return 404; # managed by Certbot
}
