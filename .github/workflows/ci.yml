name: Mecerka CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: 22

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mecerka
          POSTGRES_PASSWORD: mecerka_test_pass
          POSTGRES_DB: mecerka_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mecerka:mecerka_test_pass@127.0.0.1:5432/mecerka_test?schema=public

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install
      - run: |
          echo "Waiting for PostgreSQL to be ready..."
          timeout 30s bash -c "until nc -z 127.0.0.1 5432; do sleep 1; done"
          echo "PostgreSQL is up!"
      - run: npx prisma -v
      - run: npx prisma generate
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
      - name: Run Migrations
        run: npx prisma migrate deploy
        env:
          DEBUG: "prisma*"
      - run: npm run test
      - run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --legacy-peer-deps
      - run: ls -a
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=high

  security-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: false

      - name: SBOM Generation (Backend)
        uses: anchore/sbom-action@v0.22.2
        with:
          path: ./backend
          artifact-name: sbom-backend.spdx.json

      - name: SBOM Generation (Frontend)
        uses: anchore/sbom-action@v0.22.2
        with:
          path: ./frontend
          artifact-name: sbom-frontend.spdx.json

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Mecerka'
          path: '.'
          format: 'HTML'
          out: 'reports'
          
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: mecerka-backend:latest

      - name: Trivy Scan (Backend Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mecerka-backend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: false

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: mecerka-frontend:latest

      - name: Trivy Scan (Frontend Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mecerka-frontend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: false
