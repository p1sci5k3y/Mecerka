name: Deploy to Production (AWS EC2)

on:
  workflow_run:
    workflows: ["Mecerka CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed (or if triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Authorize GitHub Runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-name mecerka-production-sg \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,JWT_SECRET_CURRENT,NEXT_PUBLIC_API_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,CORS_ORIGIN,FRONTEND_URL,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,BACKEND_URL
          script: |
            set -e
            echo "Starting deployment..."

            # 1. Setup /opt/mecerka if missing
            if [ ! -d "/opt/mecerka/.git" ]; then
              echo "Directory /opt/mecerka not found or not a git repo. Setting up..."
              sudo mkdir -p /opt/mecerka
              # Give current user permissions
              sudo chown -R $USER:$USER /opt/mecerka
              git clone https://github.com/p1sci5k3y/Mecerka.git /opt/mecerka
            fi

            # 2. Pull latest application code
            cd /opt/mecerka
            git fetch --all
            git reset --hard origin/main

            # 2. Write secrets to .env file
            cat > .env << EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_SECRET_CURRENT=${JWT_SECRET_CURRENT}
            NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
            CORS_ORIGIN=${CORS_ORIGIN}
            FRONTEND_URL=${FRONTEND_URL}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            BACKEND_URL=${BACKEND_URL}
            EOF
            chmod 600 .env

            # 3. Rebuild images and restart containers
            sudo docker compose -f docker-compose.prod.yml build --pull
            sudo docker compose -f docker-compose.prod.yml up -d

            # 4. Configure Nginx Reverse Proxy
            sudo cp infrastructure/nginx.conf /etc/nginx/sites-available/mecerka
            sudo ln -sf /etc/nginx/sites-available/mecerka /etc/nginx/sites-enabled/mecerka
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo systemctl restart nginx

            # 5. Prune old dangling images
            sudo docker image prune -f
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_SECRET_CURRENT: ${{ secrets.JWT_SECRET_CURRENT }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Revoke GitHub Runner IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-name mecerka-production-sg \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
