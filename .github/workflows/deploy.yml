name: Deploy to Production (AWS EC2)

on:
  workflow_run:
    workflows: ["Mecerka CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed (or if triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,JWT_SECRET_CURRENT,NEXT_PUBLIC_API_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,CORS_ORIGIN,FRONTEND_URL
          script: |
            set -e

            # 1. Pull latest application code
            cd /opt/mecerka
            git fetch --all
            git reset --hard origin/main

            # 2. Write secrets to .env file (never stored in the repo)
            cat > .env << EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_SECRET_CURRENT=${JWT_SECRET_CURRENT}
            NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
            CORS_ORIGIN=${CORS_ORIGIN}
            FRONTEND_URL=${FRONTEND_URL}
            EOF
            chmod 600 .env

            # 3. Rebuild images and restart containers
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d

            # 4. Prune old dangling images to preserve t3.micro disk space
            docker image prune -f
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_SECRET_CURRENT: ${{ secrets.JWT_SECRET_CURRENT }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
