name: Deploy Dual Environment (AWS EC2)

on:
  workflow_run:
    workflows: ["Mecerka CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      git_ref: ${{ steps.meta.outputs.git_ref }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Resolve deploy metadata
        id: meta
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GIT_REF="${GITHUB_SHA}"
          else
            GIT_REF="${{ github.event.workflow_run.head_sha }}"
          fi
          OWNER_LC=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "git_ref=${GIT_REF}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GIT_REF}" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${OWNER_LC}/mecerka-backend:${GIT_REF}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${OWNER_LC}/mecerka-frontend:${GIT_REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.git_ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          provenance: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          provenance: false

  deploy-dual:
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      packages: read
    steps:
      - name: Validate deploy secrets
        run: |
          set -eu
          require_secret() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "missing required deploy secret: ${name}" >&2
              exit 1
            fi
          }

          require_secret LETSENCRYPT_EMAIL "${{ secrets.LETSENCRYPT_EMAIL }}"
          require_secret PROD_POSTGRES_PASSWORD "${{ secrets.PROD_POSTGRES_PASSWORD || secrets.POSTGRES_PASSWORD }}"
          require_secret PROD_JWT_SECRET "${{ secrets.PROD_JWT_SECRET || secrets.JWT_SECRET }}"
          require_secret PROD_JWT_SECRET_CURRENT "${{ secrets.PROD_JWT_SECRET_CURRENT || secrets.JWT_SECRET_CURRENT }}"
          require_secret SYSTEM_SETTINGS_MASTER_KEY "${{ secrets.SYSTEM_SETTINGS_MASTER_KEY || secrets.JWT_SECRET }}"
          require_secret PROD_FISCAL_PEPPER "${{ secrets.PROD_FISCAL_PEPPER || secrets.FISCAL_PEPPER }}"
          require_secret PROD_STRIPE_SECRET_KEY "${{ secrets.PROD_STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY }}"
          require_secret PROD_STRIPE_WEBHOOK_SECRET "${{ secrets.PROD_STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET }}"
          require_secret PROD_DELIVERY_STRIPE_WEBHOOK_SECRET "${{ secrets.PROD_DELIVERY_STRIPE_WEBHOOK_SECRET || secrets.DELIVERY_STRIPE_WEBHOOK_SECRET }}"
          require_secret PROD_DONATIONS_STRIPE_WEBHOOK_SECRET "${{ secrets.PROD_DONATIONS_STRIPE_WEBHOOK_SECRET || secrets.DONATIONS_STRIPE_WEBHOOK_SECRET }}"
          require_secret PROD_MAIL_HOST "${{ secrets.PROD_MAIL_HOST || secrets.MAIL_HOST }}"
          require_secret PROD_MAIL_PORT "${{ secrets.PROD_MAIL_PORT || secrets.MAIL_PORT }}"
          require_secret PROD_MAIL_FROM "${{ secrets.PROD_MAIL_FROM || secrets.MAIL_FROM }}"
          require_secret DEMO_POSTGRES_PASSWORD "${{ secrets.DEMO_POSTGRES_PASSWORD || secrets.POSTGRES_PASSWORD }}"
          require_secret DEMO_JWT_SECRET "${{ secrets.DEMO_JWT_SECRET || secrets.JWT_SECRET }}"
          require_secret DEMO_JWT_SECRET_CURRENT "${{ secrets.DEMO_JWT_SECRET_CURRENT || secrets.JWT_SECRET_CURRENT }}"
          require_secret SYSTEM_SETTINGS_MASTER_KEY "${{ secrets.SYSTEM_SETTINGS_MASTER_KEY || secrets.JWT_SECRET }}"
          require_secret DEMO_FISCAL_PEPPER "${{ secrets.DEMO_FISCAL_PEPPER || secrets.FISCAL_PEPPER }}"
          require_secret DEMO_STRIPE_SECRET_KEY "${{ secrets.DEMO_STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY }}"
          require_secret DEMO_STRIPE_WEBHOOK_SECRET "${{ secrets.DEMO_STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET }}"
          require_secret DEMO_DELIVERY_STRIPE_WEBHOOK_SECRET "${{ secrets.DEMO_DELIVERY_STRIPE_WEBHOOK_SECRET || secrets.DELIVERY_STRIPE_WEBHOOK_SECRET }}"
          require_secret DEMO_DONATIONS_STRIPE_WEBHOOK_SECRET "${{ secrets.DEMO_DONATIONS_STRIPE_WEBHOOK_SECRET || secrets.DONATIONS_STRIPE_WEBHOOK_SECRET }}"
          require_secret DEMO_MAIL_HOST "${{ secrets.DEMO_MAIL_HOST || secrets.MAIL_HOST }}"
          require_secret DEMO_MAIL_PORT "${{ secrets.DEMO_MAIL_PORT || secrets.MAIL_PORT }}"
          require_secret DEMO_MAIL_FROM "${{ secrets.DEMO_MAIL_FROM || secrets.MAIL_FROM }}"
          require_secret DEMO_DEMO_PASSWORD "${{ secrets.DEMO_DEMO_PASSWORD || secrets.DEMO_PASSWORD }}"

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        id: awscreds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Authorize GitHub Runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0124b199fb9cb1b59 \
            --protocol tcp \
            --port 22 \
            --region eu-west-1 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy prod and demo from the same image tag
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: DEPLOY_GIT_REF,GHCR_USERNAME,GHCR_TOKEN,LETSENCRYPT_EMAIL,PROD_POSTGRES_USER,PROD_POSTGRES_PASSWORD,PROD_POSTGRES_DB,PROD_JWT_SECRET,PROD_JWT_SECRET_CURRENT,PROD_SYSTEM_SETTINGS_MASTER_KEY,PROD_FISCAL_PEPPER,PROD_NEXT_PUBLIC_API_URL,PROD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,PROD_NEXT_PUBLIC_REQUIRE_MFA,PROD_CORS_ORIGIN,PROD_FRONTEND_URL,PROD_BACKEND_URL,PROD_STRIPE_SECRET_KEY,PROD_STRIPE_WEBHOOK_SECRET,PROD_DELIVERY_STRIPE_WEBHOOK_SECRET,PROD_DONATIONS_STRIPE_WEBHOOK_SECRET,PROD_MAIL_HOST,PROD_MAIL_PORT,PROD_MAIL_USER,PROD_MAIL_PASS,PROD_MAIL_FROM,PROD_DEMO_MODE,PROD_DEMO_PASSWORD,PROD_BACKEND_IMAGE,PROD_FRONTEND_IMAGE,PROD_BACKEND_HOST_PORT,PROD_FRONTEND_HOST_PORT,DEMO_POSTGRES_USER,DEMO_POSTGRES_PASSWORD,DEMO_POSTGRES_DB,DEMO_JWT_SECRET,DEMO_JWT_SECRET_CURRENT,DEMO_SYSTEM_SETTINGS_MASTER_KEY,DEMO_FISCAL_PEPPER,DEMO_NEXT_PUBLIC_API_URL,DEMO_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,DEMO_NEXT_PUBLIC_REQUIRE_MFA,DEMO_CORS_ORIGIN,DEMO_FRONTEND_URL,DEMO_BACKEND_URL,DEMO_STRIPE_SECRET_KEY,DEMO_STRIPE_WEBHOOK_SECRET,DEMO_DELIVERY_STRIPE_WEBHOOK_SECRET,DEMO_DONATIONS_STRIPE_WEBHOOK_SECRET,DEMO_MAIL_HOST,DEMO_MAIL_PORT,DEMO_MAIL_USER,DEMO_MAIL_PASS,DEMO_MAIL_FROM,DEMO_DEMO_MODE,DEMO_DEMO_PASSWORD,DEMO_BACKEND_IMAGE,DEMO_FRONTEND_IMAGE,DEMO_BACKEND_HOST_PORT,DEMO_FRONTEND_HOST_PORT
          script: |
            set -eu

            APP_DIR="/opt/mecerka"
            REPO_URL="https://github.com/p1sci5k3y/Mecerka.git"
            PROD_ENV_FILE="${APP_DIR}/deploy/prod.env"
            DEMO_ENV_FILE="${APP_DIR}/deploy/demo.env"

            require_env() {
              name="$1"
              value="$(printenv "$name" || true)"
              if [ -z "$value" ]; then
                echo "missing required deploy env: ${name}" >&2
                exit 1
              fi
            }

            show_port_owners() {
              port="$1"
              echo "[deploy] listeners on port ${port}"
              sudo ss -ltnp "( sport = :${port} )" || true
              echo "[deploy] docker publishers on port ${port}"
              sudo docker ps --format '{{.ID}}\t{{.Names}}\t{{.Ports}}' | awk -F '\t' -v port="$port" 'index($3, ":" port "->") { print }' || true
            }

            free_host_port() {
              port="$1"
              docker_ids="$(sudo docker ps --format '{{.ID}}\t{{.Ports}}' | awk -F '\t' -v port="$port" 'index($2, ":" port "->") { print $1 }' | paste -sd ' ' -)"
              host_pids=""

              show_port_owners "$port"

              if [ -n "$docker_ids" ]; then
                echo "[deploy] removing docker containers on port ${port}: ${docker_ids}"
                sudo docker rm -f $docker_ids
              fi

              host_pids="$(sudo lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null | paste -sd ' ' -)"
              if [ -n "$host_pids" ]; then
                echo "[deploy] stopping host listeners on port ${port}: ${host_pids}"
                sudo kill $host_pids || true
                sleep 2
                host_pids="$(sudo lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null | paste -sd ' ' -)"
              fi

              if [ -n "$host_pids" ]; then
                echo "[deploy] force stopping host listeners on port ${port}: ${host_pids}"
                sudo kill -9 $host_pids || true
              fi

              show_port_owners "$port"
            }

            require_env DEPLOY_GIT_REF
            require_env GHCR_USERNAME
            require_env GHCR_TOKEN
            require_env LETSENCRYPT_EMAIL

            echo "[deploy] env preflight ok"

            if [ ! -d "${APP_DIR}/.git" ]; then
              echo "[deploy] cloning repository"
              sudo mkdir -p "${APP_DIR}"
              sudo chown -R "$USER:$USER" "${APP_DIR}"
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            echo "[deploy] syncing git checkout"
            cd "${APP_DIR}"
            git fetch origin main --prune
            git reset --hard
            git clean -fdx -e deploy/
            git checkout --force --detach "${DEPLOY_GIT_REF}"

            mkdir -p "${APP_DIR}/deploy"
            chmod +x scripts/render-deploy-env.sh scripts/smoke-check-stack.sh scripts/ensure-certbot.sh scripts/ensure-dual-tls.sh scripts/smoke-check-public-urls.sh

            echo "[deploy] logging into ghcr"
            printf '%s' "${GHCR_TOKEN}" | sudo docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin

            echo "[deploy] rendering env files"
            ./scripts/render-deploy-env.sh PROD "${PROD_ENV_FILE}"
            ./scripts/render-deploy-env.sh DEMO "${DEMO_ENV_FILE}"

            echo "[deploy] validating docker compose config"
            sudo docker compose --project-name mecerka-prod --env-file "${PROD_ENV_FILE}" -f docker-compose.prod.yml config >/dev/null
            sudo docker compose --project-name mecerka-demo --env-file "${DEMO_ENV_FILE}" -f docker-compose.prod.yml config >/dev/null

            echo "[deploy] resetting demo stack"
            sudo docker compose --project-name mecerka-demo --env-file "${DEMO_ENV_FILE}" -f docker-compose.prod.yml down -v --remove-orphans || true

            echo "[deploy] resetting prod stack"
            sudo docker compose --project-name mecerka-prod --env-file "${PROD_ENV_FILE}" -f docker-compose.prod.yml down --remove-orphans || true

            echo "[deploy] freeing bound host ports"
            free_host_port "${PROD_BACKEND_HOST_PORT}"
            free_host_port "${PROD_FRONTEND_HOST_PORT}"
            free_host_port "${DEMO_BACKEND_HOST_PORT}"
            free_host_port "${DEMO_FRONTEND_HOST_PORT}"

            echo "[deploy] pulling images"
            sudo docker compose --project-name mecerka-prod --env-file "${PROD_ENV_FILE}" -f docker-compose.prod.yml pull
            sudo docker compose --project-name mecerka-demo --env-file "${DEMO_ENV_FILE}" -f docker-compose.prod.yml pull

            echo "[deploy] starting stacks"
            sudo docker compose --project-name mecerka-prod --env-file "${PROD_ENV_FILE}" -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            sudo docker compose --project-name mecerka-demo --env-file "${DEMO_ENV_FILE}" -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo "[deploy] ensuring certbot and dual tls"
            ./scripts/ensure-certbot.sh

            PRIMARY_DOMAIN="mecerka.me" \
            WWW_DOMAIN="www.mecerka.me" \
            DEMO_DOMAIN="demo.mecerka.me" \
            LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL}" \
            ./scripts/ensure-dual-tls.sh

            echo "[deploy] reloading nginx"
            sudo cp infrastructure/nginx.conf /etc/nginx/sites-available/mecerka
            sudo ln -sf /etc/nginx/sites-available/mecerka /etc/nginx/sites-enabled/mecerka
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl enable nginx >/dev/null 2>&1 || true
            if sudo systemctl is-active --quiet nginx; then
              sudo systemctl reload nginx
            else
              echo "[deploy] nginx inactive, starting service"
              sudo systemctl restart nginx
            fi
            echo "[deploy] waiting for nginx warmup"
            sleep 10

            echo "[deploy] running smoke checks"
            ./scripts/smoke-check-stack.sh "${PROD_ENV_FILE}"
            ./scripts/smoke-check-stack.sh "${DEMO_ENV_FILE}"
            PRIMARY_DOMAIN="mecerka.me" DEMO_DOMAIN="demo.mecerka.me" ./scripts/smoke-check-public-urls.sh

            echo "[deploy] pruning dangling images"
            sudo docker image prune -f >/dev/null
        env:
          DEPLOY_GIT_REF: ${{ needs.build-images.outputs.git_ref }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}

          PROD_POSTGRES_USER: ${{ vars.PROD_POSTGRES_USER || 'postgres' }}
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD || secrets.POSTGRES_PASSWORD }}
          PROD_POSTGRES_DB: ${{ vars.PROD_POSTGRES_DB || 'marketplace_prod' }}
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET || secrets.JWT_SECRET }}
          PROD_JWT_SECRET_CURRENT: ${{ secrets.PROD_JWT_SECRET_CURRENT || secrets.JWT_SECRET_CURRENT }}
          PROD_SYSTEM_SETTINGS_MASTER_KEY: ${{ secrets.SYSTEM_SETTINGS_MASTER_KEY || secrets.JWT_SECRET }}
          PROD_FISCAL_PEPPER: ${{ secrets.PROD_FISCAL_PEPPER || secrets.FISCAL_PEPPER }}
          PROD_NEXT_PUBLIC_API_URL: ${{ vars.PROD_NEXT_PUBLIC_API_URL || 'https://mecerka.me/api' }}
          PROD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.PROD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          PROD_NEXT_PUBLIC_REQUIRE_MFA: ${{ vars.PROD_NEXT_PUBLIC_REQUIRE_MFA || 'false' }}
          PROD_CORS_ORIGIN: ${{ vars.PROD_CORS_ORIGIN || 'https://mecerka.me' }}
          PROD_FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL || 'https://mecerka.me' }}
          PROD_BACKEND_URL: ${{ vars.PROD_BACKEND_URL || 'https://mecerka.me/api' }}
          PROD_STRIPE_SECRET_KEY: ${{ secrets.PROD_STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY }}
          PROD_STRIPE_WEBHOOK_SECRET: ${{ secrets.PROD_STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET }}
          PROD_DELIVERY_STRIPE_WEBHOOK_SECRET: ${{ secrets.PROD_DELIVERY_STRIPE_WEBHOOK_SECRET || secrets.DELIVERY_STRIPE_WEBHOOK_SECRET }}
          PROD_DONATIONS_STRIPE_WEBHOOK_SECRET: ${{ secrets.PROD_DONATIONS_STRIPE_WEBHOOK_SECRET || secrets.DONATIONS_STRIPE_WEBHOOK_SECRET }}
          PROD_MAIL_HOST: ${{ secrets.PROD_MAIL_HOST || secrets.MAIL_HOST }}
          PROD_MAIL_PORT: ${{ secrets.PROD_MAIL_PORT || secrets.MAIL_PORT }}
          PROD_MAIL_USER: ${{ secrets.PROD_MAIL_USER || secrets.MAIL_USER }}
          PROD_MAIL_PASS: ${{ secrets.PROD_MAIL_PASS || secrets.MAIL_PASS }}
          PROD_MAIL_FROM: ${{ secrets.PROD_MAIL_FROM || secrets.MAIL_FROM }}
          PROD_DEMO_MODE: "false"
          PROD_DEMO_PASSWORD: ""
          PROD_BACKEND_IMAGE: ${{ needs.build-images.outputs.backend_image }}
          PROD_FRONTEND_IMAGE: ${{ needs.build-images.outputs.frontend_image }}
          PROD_BACKEND_HOST_PORT: "3000"
          PROD_FRONTEND_HOST_PORT: "3001"

          DEMO_POSTGRES_USER: ${{ vars.DEMO_POSTGRES_USER || 'postgres' }}
          DEMO_POSTGRES_PASSWORD: ${{ secrets.DEMO_POSTGRES_PASSWORD || secrets.POSTGRES_PASSWORD }}
          DEMO_POSTGRES_DB: ${{ vars.DEMO_POSTGRES_DB || 'marketplace_demo' }}
          DEMO_JWT_SECRET: ${{ secrets.DEMO_JWT_SECRET || secrets.JWT_SECRET }}
          DEMO_JWT_SECRET_CURRENT: ${{ secrets.DEMO_JWT_SECRET_CURRENT || secrets.JWT_SECRET_CURRENT }}
          DEMO_SYSTEM_SETTINGS_MASTER_KEY: ${{ secrets.SYSTEM_SETTINGS_MASTER_KEY || secrets.JWT_SECRET }}
          DEMO_FISCAL_PEPPER: ${{ secrets.DEMO_FISCAL_PEPPER || secrets.FISCAL_PEPPER }}
          DEMO_NEXT_PUBLIC_API_URL: ${{ vars.DEMO_NEXT_PUBLIC_API_URL || 'https://demo.mecerka.me/api' }}
          DEMO_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.DEMO_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          DEMO_NEXT_PUBLIC_REQUIRE_MFA: ${{ vars.DEMO_NEXT_PUBLIC_REQUIRE_MFA || 'false' }}
          DEMO_CORS_ORIGIN: ${{ vars.DEMO_CORS_ORIGIN || 'https://demo.mecerka.me' }}
          DEMO_FRONTEND_URL: ${{ vars.DEMO_FRONTEND_URL || 'https://demo.mecerka.me' }}
          DEMO_BACKEND_URL: ${{ vars.DEMO_BACKEND_URL || 'https://demo.mecerka.me/api' }}
          DEMO_STRIPE_SECRET_KEY: ${{ secrets.DEMO_STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY }}
          DEMO_STRIPE_WEBHOOK_SECRET: ${{ secrets.DEMO_STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET }}
          DEMO_DELIVERY_STRIPE_WEBHOOK_SECRET: ${{ secrets.DEMO_DELIVERY_STRIPE_WEBHOOK_SECRET || secrets.DELIVERY_STRIPE_WEBHOOK_SECRET }}
          DEMO_DONATIONS_STRIPE_WEBHOOK_SECRET: ${{ secrets.DEMO_DONATIONS_STRIPE_WEBHOOK_SECRET || secrets.DONATIONS_STRIPE_WEBHOOK_SECRET }}
          DEMO_MAIL_HOST: ${{ secrets.DEMO_MAIL_HOST || secrets.MAIL_HOST }}
          DEMO_MAIL_PORT: ${{ secrets.DEMO_MAIL_PORT || secrets.MAIL_PORT }}
          DEMO_MAIL_USER: ${{ secrets.DEMO_MAIL_USER || secrets.MAIL_USER }}
          DEMO_MAIL_PASS: ${{ secrets.DEMO_MAIL_PASS || secrets.MAIL_PASS }}
          DEMO_MAIL_FROM: ${{ secrets.DEMO_MAIL_FROM || secrets.MAIL_FROM }}
          DEMO_DEMO_MODE: "true"
          DEMO_DEMO_PASSWORD: ${{ secrets.DEMO_DEMO_PASSWORD || secrets.DEMO_PASSWORD }}
          DEMO_BACKEND_IMAGE: ${{ needs.build-images.outputs.backend_image }}
          DEMO_FRONTEND_IMAGE: ${{ needs.build-images.outputs.frontend_image }}
          DEMO_BACKEND_HOST_PORT: "3010"
          DEMO_FRONTEND_HOST_PORT: "3011"

      - name: Revoke GitHub Runner IP
        if: ${{ always() && steps.ip.outputs.ipv4 != '' && steps.awscreds.outcome == 'success' }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0124b199fb9cb1b59 \
            --protocol tcp \
            --port 22 \
            --region eu-west-1 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
